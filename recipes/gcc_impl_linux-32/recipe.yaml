context:
  name: gcc_impl_linux-32
  version: "7.3.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://ftp.gnu.org/gnu/gcc/gcc-${{ version }}/gcc-${{ version }}.tar.gz
  sha256: fa06e455ca198ddc11ea4ddf2a394cf7cfb66aa7e0ab98cc1184189f1d405870

build:
  number: 1
  skip:
    - "not linux-32"
  script: build.sh
  dynamic_linking:
    binary_relocation:
      - bin/*
      - lib/*.so*
      - libexec/**/*.so*
      - libexec/**/cc1*
      - libexec/**/collect2
      - libexec/**/gcc
      - libexec/**/lto*
      - libexec/**/plugin/gengtype
    missing_dso_allowlist:
      - "*"
    rpath_allowlist:
      - "i686-conda_ubuntu-linux-gnu/sysroot/lib/libpthread-*.so"

requirements:
  ignore_run_exports:
    by_name:
      - libgcc
      - libgcc-ng
      - libstdcxx
      - libstdcxx-ng
  build:
    - gcc_linux-64
    - gxx_linux-64
    - make
    - flex
    - bison
    - gmp
    - mpfr
    - mpc
  host:
    - binutils_impl_linux-32 2.31.1.*
  run:
    - binutils_impl_linux-32 2.31.1.*

tests:
  - script:
      - CC=$(${PREFIX}/bin/*-gcc -dumpmachine)-gcc
      - ${CC} -Wall tests/aligned_alloc.c -o c_aligned
      - ./c_aligned
    files:
      recipe:
        - tests/aligned_alloc.c

about:
  homepage: https://gcc.gnu.org/
  license: GPL-3.0-only
  summary: GNU C Compiler
